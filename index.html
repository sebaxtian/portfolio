<!DOCTYPE html>
<html lang="x-default">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    
    <!-- Hreflang SEO -->
    <link rel="alternate" hreflang="es" href="https://sebaxtian.dev/es/" />
    <link rel="alternate" hreflang="en" href="https://sebaxtian.dev/en/" />
    <link rel="alternate" hreflang="x-default" href="https://sebaxtian.dev/" />

    <script>
        (function() {
            // 1. Check localStorage first
            var lang = localStorage.getItem('preferredLang');
            
            // 2. If not, detect browser language
            if (!lang) {
                var navLang = navigator.language || navigator.userLanguage;
                if (navLang.startsWith('es')) {
                    lang = 'es';
                } else {
                    lang = 'en';
                }
            }

            // 3. Redirect
            var targetUrl = '/' + lang + '/';
            
            // Preserve hash if present in current URL
            if (window.location.hash) {
                targetUrl += window.location.hash;
            }

            window.location.href = targetUrl;
        })();
    </script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <p>Redirecting...</p>
    </div>
</body>
</html>
